# Telegram Trading Signals Bot - Docker Compose for 24/7 run
# Usage: copy .env and run: docker compose up -d

services:
  bot:
    build: .
    container_name: telegram-signals-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    # Optional: bind to same host/port as in .env
    environment:
      - WEBHOOK_HOST=0.0.0.0
      - WEBHOOK_PORT=5000
